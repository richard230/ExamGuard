<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Report Card Preferences - Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600,700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --bg-0: #f6f8ff;
      --bg-1: #eef2ff;
      --accent: #0f172a;
      --accent-2: #1e40af;
      --accent-3: #2647a6;
      --muted: #6b7280;
      --card-bg: #ffffff;
      --sidebar-w: 300px;
      --radius: 12px;
      --shadow: 0 8px 20px rgba(11, 42, 60, 0.04);
      --shadow-hover: 0 12px 32px rgba(59, 130, 246, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg-0), var(--bg-1));
      -webkit-font-smoothing: antialiased;
      color: #07102a;
      width: 100vw;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      display: flex;
      min-height: 100vh;
      align-items: stretch;
      width: 100vw;
      overflow-x: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: linear-gradient(180deg, #07102a 0%, #0b3b82 100%);
      color: #fff;
      padding: 20px 16px;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
      box-shadow: 4px 0 28px rgba(2, 11, 24, 0.12);
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      transition: transform 0.28s ease;
    }

    .sidebar.hidden {
      transform: translateX(-110%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.45);
      z-index: 50;
      display: none;
    }

    .sidebar-overlay.active {
      display: block;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }

    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
      border: 3px solid rgba(255, 224, 102, 0.12);
      background: #fff;
    }

    .brand .title {
      font-weight: 800;
      font-size: 1.05rem;
      color: #ffe066;
    }

    .brand .subtitle {
      font-size: 0.85rem;
      color: #b0c4ff;
    }

    .search {
      margin: 6px 0;
    }

    .search input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 0.95rem;
    }

    .search input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.98rem;
      color: #e6eefc;
      transition: background 0.2s, color 0.2s;
    }

    .nav a.active,
    .nav a:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffe066;
    }

    /* TOPBAR */
    .topbar {
      position: fixed;
      left: var(--sidebar-w);
      top: 0;
      width: calc(100% - var(--sidebar-w));
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid #eef3ff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(6px);
    }

    .sidebar-toggle {
      display: none;
      background: var(--accent-2);
      color: #fff;
      border: none;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
      font-size: 1.05rem;
      margin-right: 12px;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-title {
      font-weight: 800;
      font-size: 1.18rem;
      color: var(--accent-2);
    }

    .admin-badge {
      display: inline-block;
      background: linear-gradient(90deg, #10b981, #059669);
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 8px;
    }

    .topbar-icons {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    /* MAIN CONTENT */
    .main-content {
      margin-left: var(--sidebar-w);
      padding: 20px;
      flex: 1;
      min-height: 100vh;
      padding-top: 80px;
      overflow-y: auto;
      width: calc(100% - var(--sidebar-w));
      box-sizing: border-box;
    }

    /* SECTION */
    .section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid #eef3ff;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .section-title {
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--accent);
      margin: 0 0 24px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* FORM STYLES */
    .prefs-form {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .prefs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 24px;
    }

    .prefs-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .prefs-column-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .pref-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 6px;
      transition: background 0.12s, color 0.12s;
    }

    .pref-label:hover {
      background: #f9fbff;
      color: var(--accent-2);
    }

    .pref-label input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent-2);
      cursor: pointer;
      flex-shrink: 0;
      border-radius: 4px;
      border: 1.5px solid #e3e8ee;
      background: #fff;
      transition: all 0.12s ease;
    }

    .pref-label input[type="checkbox"]:hover {
      border-color: var(--accent-2);
    }

    .pref-label input[type="checkbox"]:checked {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    /* DIVIDER */
    .divider {
      width: 100%;
      border: none;
      border-top: 1.5px solid #eef3ff;
      margin: 24px 0;
    }

    /* BUTTONS */
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, var(--accent-2), #3b82f6);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      width: fit-content;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* STATUS MESSAGE */
    .status-message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      display: none;
      align-items: center;
      gap: 10px;
      min-height: 44px;
    }

    .status-message.show {
      display: flex;
    }

    .status-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status-message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    /* SPINNER */
    #pageSpinnerOverlay {
      position: fixed;
      z-index: 99999;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s;
    }

    #pageSpinnerOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      border: 6px solid #ddeaff;
      border-top: 6px solid #2647a6;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spinner-spin 1s linear infinite;
    }

    @keyframes spinner-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 8px;
      background: #f4f8fc;
    }

    ::-webkit-scrollbar-thumb {
      background: #e2e7ee;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #d0d7e3;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .prefs-grid {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .sidebar-toggle {
        display: inline-flex;
      }

      .sidebar {
        transform: translateX(-110%);
      }

      .sidebar.open {
        transform: translateX(0);
        box-shadow: 0 24px 48px rgba(2, 6, 23, 0.5);
      }

      .topbar {
        left: 0;
        width: 100%;
      }

      .main-content {
        margin-left: 0;
        width: 100%;
        padding: 14px;
        padding-top: 80px;
      }

      .section {
        padding: 20px;
      }

      .prefs-grid {
        grid-template-columns: 1fr;
      }

      .pref-label {
        padding: 10px;
      }
    }

    @media (max-width: 480px) {
      .page-title {
        font-size: 1rem;
      }

      .admin-badge {
        display: block;
        margin-left: 0;
        margin-top: 8px;
      }

      .section {
        padding: 16px;
      }

      .section-title {
        font-size: 1.1rem;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Spinner Overlay -->
  <div id="pageSpinnerOverlay">
    <div class="spinner"></div>
  </div>

  <div class="app" id="app">
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Admin navigation">
      <div class="brand">
        <img src="https://goldlincschools.com/assets/media/logos/favicon.ico" alt="Logo">
        <div>
          <div class="title">GOLD & LINC</div>
          <div class="subtitle">Admin Portal</div>
        </div>
      </div>

      <div class="search">
        <input type="text" placeholder="Quick search..." aria-label="Quick search">
      </div>

      <nav class="nav" aria-label="Primary">
        <a href="admin.html" class="nav-link">
          <span>🏠</span> Dashboard
        </a>
        <a href="admission.html" class="nav-link">
          <span>🎓</span> Admission
        </a>
        <a href="people.html" class="nav-link">
          <span>👥</span> People
        </a>
        <a href="academics.html" class="nav-link">
          <span>📚</span> Academics
        </a>
        <a href="results.html" class="nav-link">
          <span>📄</span> Results
        </a>
        <a href="manage-templates.html" class="nav-link active">
          <span>🎨</span> Templates
        </a>
        <a href="finance.html" class="nav-link">
          <span>💰</span> Finance
        </a>
        <a href="attendance.html" class="nav-link">
          <span>🗓️</span> Attendance
        </a>
        <a href="#" class="nav-link">
          <span>⚙️</span> Settings
        </a>
      </nav>

      <div style="margin-top: auto; color: #b0c4ff; font-size: 0.85rem;">
        Signed in as <strong id="adminName">Admin</strong>
      </div>
    </aside>

    <!-- TOPBAR -->
    <div class="topbar" role="banner">
      <div class="page-header">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open Sidebar">☰</button>
        <div>
          <h1 class="page-title">
            <i class="fa fa-palette"></i>
            Report Card Preferences
            <span class="admin-badge">Admin</span>
          </h1>
        </div>
      </div>

      <div class="topbar-icons">
        <button class="icon-btn" title="Notifications">🔔</button>
        <button class="icon-btn" title="Help">❓</button>
        <button class="icon-btn" title="Settings">⚙️</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-content" role="main">
      <section class="section">
        <h2 class="section-title">
          <i class="fa fa-cog"></i>
          Customize Report Card Display
        </h2>

        <form id="prefsForm" class="prefs-form">
          <div class="prefs-grid">
            <!-- COLUMN 1: Academic Info -->
            <div class="prefs-column">
              <div class="prefs-column-title">Academic Information</div>
              <label class="pref-label">
                <input type="checkbox" name="showTeacherRemark">
                <span>Show Teacher's Remark</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showPsychomotorSkills">
                <span>Show Psychomotor Skills</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showAffectiveSkills">
                <span>Show Affective Skills</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showSubjectPosition">
                <span>Show Subject Position</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showGradePoints">
                <span>Show Grade Points</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showGPA">
                <span>Show GPA Row</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showResultSummary">
                <span>Show Result Summary</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showResultSummaryLabel">
                <span>Show Result Summary Label</span>
              </label>
            </div>

            <!-- COLUMN 2: Student & School Info -->
            <div class="prefs-column">
              <div class="prefs-column-title">Student & School Info</div>
              <label class="pref-label">
                <input type="checkbox" name="showStudentPhoto">
                <span>Show Student Photo</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showStudentAge">
                <span>Show Student Age</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showStudentEmail">
                <span>Show Student Email</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showClassSize">
                <span>Show Class Size</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showSchoolMotto">
                <span>Show School Motto</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showSchoolLogo">
                <span>Show School Logo</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showCoatOfArms">
                <span>Show Coat of Arms</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showRedSeal">
                <span>Show Red Seal/Stamp</span>
              </label>
            </div>

            <!-- COLUMN 3: Other Settings -->
            <div class="prefs-column">
              <div class="prefs-column-title">Additional Options</div>
              <label class="pref-label">
                <input type="checkbox" name="showAttendance">
                <span>Show Attendance Table</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showAttendanceNoOfDays">
                <span>Show No. of School Days</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showAttendancePresent">
                <span>Show Days Present</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showAttendanceAbsent">
                <span>Show Days Absent</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showAttendancePercent">
                <span>Show Attendance (%)</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showPrincipalComment">
                <span>Show Principal's Comment</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showNextTermDate">
                <span>Show Next Term Date</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showPrintedDate">
                <span>Show Printed Date</span>
              </label>
              <label class="pref-label">
                <input type="checkbox" name="showKeyToGrades">
                <span>Show Key to Grades Table</span>
              </label>
            </div>
          </div>

          <hr class="divider">

          <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
            <button class="btn" type="submit" id="saveBtn">
              <i class="fa fa-save"></i> Save Preferences
            </button>
            <button class="btn" type="reset" style="background: transparent; border: 1.5px solid #eef3ff; color: var(--accent-2);">
              <i class="fa fa-undo"></i> Reset
            </button>
          </div>

          <div id="statusMsg" class="status-message"></div>
        </form>
      </section>
    </main>
  </div>

  <script>
    // BACKEND URL
    const API_BASE_URL = "https://goldlincschools.onrender.com";

    // Spinner overlay logic
    document.addEventListener('DOMContentLoaded', () => {
      const spinner = document.getElementById('pageSpinnerOverlay');
      if (spinner) spinner.style.display = 'flex';
      setTimeout(() => {
        if (spinner) {
          spinner.classList.add('hidden');
          setTimeout(() => { spinner.style.display = 'none'; }, 400);
        }
      }, 1200);
    });

    // Sidebar mobile toggle logic
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    if (sidebarToggle) sidebarToggle.addEventListener('click', openSidebar);
    if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSidebar();
    });

    // Preferences logic
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('prefsForm');
      const statusMsg = document.getElementById('statusMsg');
      const saveBtn = document.getElementById('saveBtn');
      const API_URL = `${API_BASE_URL}/api/report/preferences`;

      function getAdminToken() {
        return localStorage.getItem('adminToken') ||
               localStorage.getItem('superadmin_token') ||
               localStorage.getItem('token') || '';
      }

      function showStatus(message, type) {
        statusMsg.textContent = message;
        statusMsg.className = `status-message show ${type}`;
        if (type !== 'info') {
          setTimeout(() => {
            statusMsg.classList.remove('show');
          }, 4000);
        }
      }

      // Load preferences
      fetch(API_URL, {
        headers: {
          'Authorization': 'Bearer ' + getAdminToken()
        }
      })
        .then(r => r.json())
        .then(pref => {
          Object.keys(pref).forEach(key => {
            const element = form.elements[key];
            if (element && element.type === 'checkbox') {
              element.checked = !!pref[key];
            }
          });
        })
        .catch((err) => {
          console.error(err);
          showStatus('Failed to load preferences. Please ensure you are logged in as admin.', 'error');
        });

      // Save preferences
      form.onsubmit = async function(e) {
        e.preventDefault();
        saveBtn.disabled = true;
        showStatus('Saving preferences...', 'info');

        const data = {};
        Array.from(form.elements).forEach(el => {
          if (el.type === "checkbox" && el.name) {
            data[el.name] = el.checked;
          }
        });

        try {
          const res = await fetch(API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + getAdminToken()
            },
            body: JSON.stringify(data)
          });

          if (res.ok) {
            showStatus('✓ Preferences saved successfully!', 'success');
          } else if (res.status === 401) {
            showStatus('Unauthorized. Please login as admin and try again.', 'error');
          } else {
            const error = await res.json();
            showStatus(error.message || 'Failed to save preferences.', 'error');
          }
        } catch (err) {
          console.error(err);
          showStatus('Network error. Please try again.', 'error');
        }

        saveBtn.disabled = false;
      };
    });

    // Navigation
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        if (link.href === '#' || link.href.includes('manage-templates.html')) {
          e.preventDefault();
        }
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      });
    });
  </script>
</body>
</html>
