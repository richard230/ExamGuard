<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Check Results | Gold and Linc Schools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --bg-0: #f6f8ff;
      --bg-1: #eef2ff;
      --accent: #3b82f6;
      --accent-2: #6366f1;
      --muted: #6b7280;
      --card-bg: #ffffff;
      --radius: 12px;
      --sidebar-w: 300px;
      --shadow: 0 8px 20px rgba(11, 42, 60, 0.04);
      --shadow-hover: 0 12px 32px rgba(59, 130, 246, 0.08);
      --text-main: #0b2a44;
      --text-muted: #7a90b3;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --primary: #2647a6;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', system-ui, Arial;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(180deg, var(--bg-0), var(--bg-1));
      color: var(--text-main);
      width: 100vw;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* App layout */
    .app {
      display: flex;
      min-height: 100vh;
      align-items: stretch;
      width: 100vw;
      max-width: 100vw;
      overflow-x: hidden;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.45);
      z-index: 50;
      display: none;
    }

    .overlay.visible {
      display: block;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%);
      color: #fff;
      padding: 20px 16px;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
      box-shadow: 4px 0 28px rgba(15, 23, 42, 0.12);
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
    }

    .sidebar.hidden {
      transform: translateX(-110%);
      transition: transform 0.28s ease;
    }

    .sidebar.open {
      transform: translateX(0);
      transition: transform 0.28s ease;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .brand img {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
      border: 3px solid rgba(255, 224, 102, 0.12);
      background: #fff;
    }

    .brand .title {
      font-weight: 700;
      font-size: 1.18rem;
      color: #ffe066;
    }

    .brand .subtitle {
      font-size: 0.96rem;
      color: rgba(255, 255, 255, 0.9);
    }

    /* Nav */
    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 6px;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1.05rem;
      color: #e6eefc;
      background: transparent;
      transition: background 0.12s, transform 0.08s;
      touch-action: manipulation;
      cursor: pointer;
    }

    .nav a.active,
    .nav a:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffe066;
      transform: translateX(3px);
    }

    .spacer {
      flex: 1;
    }

    .profile {
      display: flex;
      gap: 12px;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .profile img {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid #ffe066;
    }

    .profile .name {
      font-weight: 700;
      font-size: 1.02rem;
      color: #ffe066;
    }

    .profile .muted {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.92rem;
    }

    /* TOPBAR */
    .topbar {
      position: fixed;
      left: var(--sidebar-w);
      top: 0;
      width: calc(100vw - var(--sidebar-w));
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.86);
      border-bottom: 1px solid rgba(11, 42, 60, 0.06);
      box-shadow: 0 6px 18px rgba(11, 42, 60, 0.04);
      min-height: 64px;
      max-width: 100%;
      box-sizing: border-box;
    }

    .topbar .hamburger {
      display: none;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 1.05rem;
    }

    .topbar .page-title {
      font-weight: 800;
      font-size: 1.18rem;
      color: var(--accent-2);
    }

    /* MAIN CONTENT */
    .main {
      margin-left: var(--sidebar-w);
      padding: 20px;
      flex: 1;
      transition: margin-left 0.28s;
      min-height: 100vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      max-width: calc(100vw - var(--sidebar-w));
      box-sizing: border-box;
      overflow-x: hidden;
      padding-top: 90px;
    }

    .main.full {
      margin-left: 0;
      max-width: 100vw;
    }

    /* SECTIONS */
    .results-section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(11, 42, 60, 0.03);
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent-2);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title i {
      color: var(--accent);
    }

    /* SEARCH FORM */
    .result-search-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      align-items: end;
    }

    .result-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-form-label {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-main);
    }

    .result-form-input,
    .result-form-select {
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Inter', Arial, sans-serif;
      transition: all 0.12s ease;
      background: #fff;
      color: var(--text-main);
    }

    .result-form-input:focus,
    .result-form-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .result-form-input:disabled {
      background: #f3f6fb;
      color: var(--muted);
      cursor: not-allowed;
    }

    .result-form-input:read-only {
      background: #f3f6fb;
      cursor: not-allowed;
    }

    .result-search-btn {
      padding: 10px 20px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.95rem;
    }

    .result-search-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .result-search-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ERROR MESSAGE */
    .result-search-error {
      padding: 12px 16px;
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #b91c1c;
      font-weight: 600;
      margin-top: 12px;
    }

    /* RESULT TABLE */
    .results-table-container {
      overflow-x: auto;
      margin: 16px 0;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .results-table thead {
      background: #f8faff;
      border-bottom: 2px solid #e5e7eb;
    }

    .results-table th {
      padding: 12px 10px;
      text-align: left;
      font-weight: 700;
      color: var(--accent-2);
    }

    .results-table td {
      padding: 12px 10px;
      border-bottom: 1px solid #eef3ff;
    }

    .results-table tbody tr:hover {
      background: #f9fbff;
    }

    .results-table tbody tr:last-child td {
      border-bottom: none;
    }

    .grade-high {
      color: var(--success);
      font-weight: 700;
    }

    .grade-mid {
      color: var(--warning);
      font-weight: 700;
    }

    .grade-low {
      color: var(--danger);
      font-weight: 700;
    }

    /* DISPLAY INFO */
    .result-display-info {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 16px;
      padding: 12px 0;
      border-bottom: 1px solid #eef3ff;
    }

    .result-display-info span {
      font-size: 0.95rem;
    }

    .result-display-info b {
      color: var(--accent-2);
      font-weight: 700;
    }

    /* BUTTONS */
    .download-btn {
      padding: 10px 20px;
      background: linear-gradient(90deg, var(--success), #059669);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.12s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.95rem;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(16, 185, 129, 0.12);
    }

    /* PREVIOUS RESULTS */
    .previous-results-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .previous-result-card {
      padding: 14px;
      background: linear-gradient(135deg, #f0f9ff 0%, #eff6ff 100%);
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .previous-result-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }

    .previous-result-title {
      font-weight: 700;
      color: var(--accent-2);
      margin-bottom: 4px;
    }

    .previous-result-meta {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Accessibility */
    .nav a:focus {
      outline: 3px solid rgba(99, 102, 241, 0.18);
      outline-offset: 3px;
      border-radius: 8px;
    }

    /* Helper */
    .small {
      font-size: 0.92rem;
      color: var(--muted);
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .main {
        padding: 20px 13px;
      }
    }

    @media (max-width: 980px) {
      .topbar .hamburger {
        display: inline-flex;
      }
    }

    @media (max-width: 720px) {
      :root {
        --sidebar-w: 86vw;
      }

      .sidebar {
        transform: translateX(-110%);
        position: fixed;
        width: var(--sidebar-w);
        min-width: var(--sidebar-w);
      }

      .sidebar.open {
        transform: translateX(0);
        box-shadow: 0 24px 48px rgba(2, 6, 23, 0.5);
      }

      .sidebar.hidden {
        transform: translateX(-110%);
      }

      .overlay {
        display: none;
      }

      .overlay.visible {
        display: block;
      }

      body.no-scroll {
        overflow: hidden;
        height: 100vh;
        touch-action: none;
      }

      .main {
        margin-left: 0;
        padding: 20px 14px;
        padding-top: 20px;
        max-width: 100vw;
      }

      .main.full {
        margin-left: 0;
      }

      .topbar {
        left: 0;
        width: 100vw;
        padding: 10px 12px;
        min-height: 56px;
      }

      .nav a {
        padding: 14px 14px;
        font-size: 1.08rem;
      }

      .result-search-form {
        grid-template-columns: 1fr;
      }

      .results-table {
        font-size: 0.85rem;
      }

      .results-table th,
      .results-table td {
        padding: 8px 6px;
      }

      .result-display-info {
        gap: 12px;
      }
    }

    @media (max-width: 480px) {
      .main {
        padding: 20px 2vw;
        padding-top: 80px;
      }

      .topbar {
        padding: 10px 2vw;
      }

      .results-section {
        padding: 12px;
      }

      .section-title {
        font-size: 1.05rem;
      }

      .results-table {
        font-size: 0.8rem;
      }

      .results-table th,
      .results-table td {
        padding: 6px 4px;
      }

      .previous-results-list {
        grid-template-columns: 1fr;
      }

      .result-search-form {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="overlay" id="overlay" aria-hidden="true"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="Main navigation" role="navigation">
      <div class="brand" aria-hidden="false">
        <img src="https://goldlincschools.com/assets/media/logos/favicon.ico" alt="Logo">
        <div>
          <div class="title">ExamGuard</div>
          <div class="subtitle" id="schoolSubtitle">Gold & Linc Schools</div>
        </div>
      </div>

      <nav class="nav" id="nav" aria-label="Primary">
        <a href="student-dashboard.html" data-section="home" onclick="navClick(event)">🏠 Home</a>
        <a href="#" data-section="courses" onclick="navClick(event)">📘 My Courses</a>
        <a href="#" data-section="assignments" onclick="navClick(event)">📝 Assignments</a>
        <a href="check-result.html" data-section="grades" class="active" onclick="navClick(event)">📊 Grades</a>
        <a href="#" data-section="timetable" onclick="navClick(event)">⏰ Timetable</a>
        <a href="#" data-section="messages" onclick="navClick(event)">✉️ Messages</a>
        <a href="#" data-section="resources" onclick="navClick(event)">📂 Resources</a>
        <a href="#" data-section="settings" onclick="navClick(event)">⚙️ Settings</a>
      </nav>

      <div class="spacer" aria-hidden="true"></div>

      <div class="profile" role="region" aria-label="Student profile">
        <img src="" alt="Student avatar" id="studentAvatar">
        <div>
          <div class="name" id="studentName">Student</div>
          <div class="muted" id="studentClass">N/A</div>
        </div>
      </div>
    </aside>

    <!-- Fixed Topbar -->
    <div class="topbar" id="fixedTopbar">
      <div style="display:flex; gap:12px; align-items:center;">
        <button class="hamburger" id="hamburger" aria-label="Open menu">☰</button>
        <div>
          <div class="page-title" id="pageTitle">📊 Check Results</div>
        </div>
      </div>

      <div style="display:flex; gap:12px; align-items:center;">
        <img src="" alt="You" style="width:44px;height:44px;border-radius:8px;object-fit:cover;border:2px solid #fff;" id="topbarAvatar">
      </div>
    </div>

    <!-- Main Content -->
    <main class="main" id="main" role="main" tabindex="-1">
      <!-- Search Section -->
      <section class="results-section" id="searchSection">
        <div class="section-title"><i class="fa fa-search"></i> Check Your Result</div>
        <form class="result-search-form" id="resultSearchForm" autocomplete="off" onsubmit="return handleResultSearch(event)">
          <div class="result-form-group">
            <label class="result-form-label" for="regNoInput">Registration Number</label>
            <input id="regNoInput" class="result-form-input" placeholder="Enter Reg. Number" readonly disabled required>
          </div>
          <div class="result-form-group">
            <label class="result-form-label" for="classInput">Class</label>
            <select id="classInput" class="result-form-select" required>
              <option value="">Select Class</option>
              <option>Beginner</option>
              <option>KG1</option>
              <option>KG2</option>
              <option>Creche</option>
              <option>Nursery 1</option>
              <option>Nursery 2</option>
              <option>Nursery 3</option>
              <option>Primary 1</option>
              <option>Primary 2</option>
              <option>Primary 3</option>
              <option>Primary 4</option>
              <option>Primary 5</option>
              <option>Primary 6</option>
              <option>JSS1</option>
              <option>JSS2</option>
              <option>JSS3</option>
              <option>SS1</option>
              <option>SS2</option>
              <option>SS3</option>
            </select>
          </div>
          <div class="result-form-group">
            <label class="result-form-label" for="sessionInput">Session</label>
            <select id="sessionInput" class="result-form-select" required>
              <option value="">Select Session</option>
              <option>2027–2028</option>
              <option>2026–2027</option>
              <option>2025–2026</option>
              <option>2024–2025</option>
              <option>2023–2024</option>
              <option>2022–2023</option>
            </select>
          </div>
          <div class="result-form-group">
            <label class="result-form-label" for="termInput">Term</label>
            <select id="termInput" class="result-form-select" required>
              <option value="">Select Term</option>
              <option>FIRST TERM</option>
              <option>SECOND TERM</option>
              <option>THIRD TERM</option>
            </select>
          </div>
          <button class="result-search-btn" type="submit" id="submitBtn"><i class="fa fa-search"></i> View Result</button>
        </form>
        <div class="result-search-error" id="searchError" style="display:none;"></div>
      </section>

      <!-- Results Display Section -->
      <section class="results-section" id="resultsDisplaySection" style="display:none;">
        <div class="section-title"><i class="fa fa-table"></i> Result Details</div>
        <div class="result-display-info">
          <span><b>Reg. No:</b> <span id="dispRegNo"></span></span>
          <span><b>Class:</b> <span id="dispClass"></span></span>
          <span><b>Session:</b> <span id="dispSession"></span></span>
          <span><b>Term:</b> <span id="dispTerm"></span></span>
        </div>
        <div class="results-table-container">
          <table class="results-table" id="resultsTable">
            <thead>
              <tr>
                <th>Subject</th>
                <th>CA1</th>
                <th>CA2</th>
                <th>Midterm</th>
                <th>Exam</th>
                <th>Total</th>
                <th>Grade</th>
                <th>Remark</th>
                <th>Position</th>
              </tr>
            </thead>
            <tbody>
              <!-- JS fills rows -->
            </tbody>
          </table>
        </div>
        <button class="download-btn" onclick="downloadCurrentResult()"><i class="fa fa-download"></i> Download Result</button>
      </section>

      <!-- Previously Viewed Results -->
      <section class="results-section">
        <div class="section-title"><i class="fa fa-history"></i> Previously Viewed Results</div>
        <div class="previous-results-list" id="previousResultsList"></div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE_URL = "https://goldlincschools.onrender.com";
    const API_TIMEOUT = 15000; // 15 seconds timeout

    let lastStudentProfile = null;
    let isLoadingResults = false;

    // ============================================
    // Helper: Fetch with timeout
    // ============================================
    async function fetchWithTimeout(url, options = {}, timeout = API_TIMEOUT) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        return response;
      } catch (error) {
        clearTimeout(timeoutId);
        throw error;
      }
    }

    // ============================================
    // Sidebar & Navigation Functions
    // ============================================
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    hamburger?.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
      document.body.classList.toggle('no-scroll');
    });

    overlay?.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
      document.body.classList.remove('no-scroll');
    });

    function navClick(event) {
      event.preventDefault();
      const link = event.currentTarget;
      document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
      link.classList.add('active');
      
      // Close sidebar on mobile
      if (window.innerWidth <= 720) {
        sidebar.classList.remove('open');
        overlay.classList.remove('visible');
        document.body.classList.remove('no-scroll');
      }

      // Navigate if href is set
      const href = link.getAttribute('href');
      if (href && href !== '#') {
        window.location.href = href;
      }
    }

    // Affixed values
    let affixedClass = null, affixedSession = null, affixedTerm = null;

    // Autofill and lock registration number
    async function autofillRegNoAndAffix() {
      const token = localStorage.getItem('studentToken') || localStorage.getItem('token');
      const regNoInput = document.getElementById('regNoInput');
      const submitBtn = document.getElementById('submitBtn');
      
      if (!token) {
        regNoInput.value = '';
        regNoInput.placeholder = 'Login required';
        regNoInput.disabled = true;
        regNoInput.readOnly = true;
        submitBtn.disabled = true;
        return;
      }

      try {
        const res = await fetchWithTimeout(API_BASE_URL + '/api/students/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (res.ok) {
          const student = await res.json();
          lastStudentProfile = student;
          const regNo = student.regNo || student.student_id || '';
          regNoInput.value = regNo;
          regNoInput.disabled = true;
          regNoInput.readOnly = true;
          submitBtn.disabled = false;
          
          affixedClass = student.class_name || student.class || null;
          affixedSession = student.session || null;
          affixedTerm = student.term || null;

          if (affixedClass) {
            const classInput = document.getElementById('classInput');
            classInput.value = affixedClass;
            classInput.disabled = true;
          }
          if (affixedSession) {
            const sessionInput = document.getElementById('sessionInput');
            sessionInput.value = affixedSession;
            sessionInput.disabled = true;
          }
          if (affixedTerm) {
            const termInput = document.getElementById('termInput');
            termInput.value = affixedTerm;
            termInput.disabled = true;
          }

          // Update sidebar profile
          document.getElementById('studentName').textContent = student.full_name || student.name || 'Student';
          document.getElementById('studentClass').textContent = affixedClass || 'N/A';
          if (student.avatar || student.profile_pic) {
            document.getElementById('studentAvatar').src = student.avatar || student.profile_pic;
            document.getElementById('topbarAvatar').src = student.avatar || student.profile_pic;
          }
        } else {
          regNoInput.value = '';
          regNoInput.placeholder = 'Login required';
          regNoInput.disabled = true;
          regNoInput.readOnly = true;
          submitBtn.disabled = true;
        }
      } catch (error) {
        console.error('Error autofilling student data:', error);
        regNoInput.value = '';
        regNoInput.placeholder = 'Login required';
        regNoInput.disabled = true;
        regNoInput.readOnly = true;
        submitBtn.disabled = true;
      }
    }

    autofillRegNoAndAffix();

    function getViewedResults() {
      let arr = [];
      try {
        arr = JSON.parse(localStorage.getItem("viewedResults")) || [];
      } catch {}
      return arr;
    }

    function saveViewedResult(entry) {
      let arr = getViewedResults();
      arr = arr.filter(x => !(
        x.regNo === entry.regNo && x.session === entry.session && x.term === entry.term && x.class === entry.class
      ));
      arr.unshift(entry);
      if (arr.length > 6) arr = arr.slice(0, 6);
      localStorage.setItem("viewedResults", JSON.stringify(arr));
    }

    function renderPreviousResults() {
      const arr = getViewedResults();
      const el = document.getElementById("previousResultsList");
      if (!arr.length) {
        el.innerHTML = `<div style="color:var(--muted); padding: 12px; text-align: center;">No previously viewed results.</div>`;
        return;
      }
      el.innerHTML = arr.map((r, i) => `
        <div class="previous-result-card" onclick="viewPreviousResult(${i})">
          <div class="previous-result-title">${r.regNo}</div>
          <div class="previous-result-meta">${r.class} • ${r.session} • ${r.term}</div>
        </div>
      `).join("");
    }

    function viewPreviousResult(idx) {
      const arr = getViewedResults();
      if (arr[idx]) displayResult(arr[idx]);
    }

// Replace the handleResultSearch function with this updated version

async function handleResultSearch(e) {
  e.preventDefault();

  // Prevent double submission
  if (isLoadingResults) {
    return false;
  }

  isLoadingResults = true;

  const regNo = document.getElementById("regNoInput").value.trim();
  const klass = document.getElementById("classInput").value;
  const session = document.getElementById("sessionInput").value;
  const term = document.getElementById("termInput").value;
  const errorBox = document.getElementById("searchError");
  const submitBtn = document.getElementById('submitBtn');
  
  errorBox.style.display = "none";
  submitBtn.disabled = true;

  try {
    if (
      (affixedClass && klass !== affixedClass) ||
      (affixedSession && session !== affixedSession) ||
      (affixedTerm && term !== affixedTerm)
    ) {
      errorBox.textContent = "You can only check results for your assigned class, session and term.";
      errorBox.style.display = "block";
      submitBtn.disabled = false;
      isLoadingResults = false;
      return false;
    }

    if (!regNo || !klass || !session || !term) {
      errorBox.textContent = "All fields are required!";
      errorBox.style.display = "block";
      submitBtn.disabled = false;
      isLoadingResults = false;
      return false;
    }

    // Get scratch card from student profile or prompt user
    let scratchCard = null;
    if (lastStudentProfile && lastStudentProfile.scratchCard) {
      scratchCard = lastStudentProfile.scratchCard;
    } else {
      scratchCard = prompt("Enter your scratch card number:");
      if (!scratchCard) {
        errorBox.textContent = "Scratch card is required to verify your identity.";
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        isLoadingResults = false;
        return false;
      }
    }

    // Call the correct endpoint: /api/results/check
    const checkUrl = new URL(API_BASE_URL + '/api/results/check');
    checkUrl.searchParams.append('regNo', regNo);
    checkUrl.searchParams.append('scratchCard', scratchCard);
    checkUrl.searchParams.append('class', klass);
    checkUrl.searchParams.append('session', session);
    checkUrl.searchParams.append('term', term);

    console.log('Fetching from:', checkUrl.toString());

    const res = await fetchWithTimeout(checkUrl.toString());

    if (!res.ok) {
      const errorData = await res.json().catch(() => ({}));
      throw new Error(errorData.error || `API error: ${res.status}`);
    }

    const data = await res.json();
    console.log('Results data:', data);

    // Display the results
    displayResult({
      regNo: regNo,
      class: klass,
      session: session,
      term: term,
      resultsData: data
    });

    // Save to viewed history
    saveViewedResult({
      regNo: regNo,
      class: klass,
      session: session,
      term: term
    });

    renderPreviousResults();

  } catch (err) {
    console.error('Error fetching results:', err);
    errorBox.textContent = err.message || 'Failed to fetch results. Please try again.';
    errorBox.style.display = "block";
  } finally {
    submitBtn.disabled = false;
    isLoadingResults = false;
  }

  return false;
}

// Update the displayResult function to handle the new data structure
function displayResult(resultEntry) {
  const data = resultEntry.resultsData;
  
  if (!data || !data.results) {
    alert('No result data available');
    return;
  }

  // Update display info
  document.getElementById('dispRegNo').textContent = resultEntry.regNo;
  document.getElementById('dispClass').textContent = resultEntry.class;
  document.getElementById('dispSession').textContent = resultEntry.session;
  document.getElementById('dispTerm').textContent = resultEntry.term;

  // Populate results table
  const tbody = document.querySelector('#resultsTable tbody');
  tbody.innerHTML = '';

  const results = data.results || [];
  if (results.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:20px; color:var(--muted);">No results found.</td></tr>';
    document.getElementById('resultsDisplaySection').style.display = 'block';
    return;
  }

  results.forEach((r, idx) => {
    const ca1 = r.ca1_score || '—';
    const ca2 = r.ca2_score || '—';
    const midterm = r.midterm_score || '—';
    const exam = r.exam_score || '—';
    const total = r.total || 0;
    const grade = r.grade || '—';
    const remark = r.remarks || '—';
    const position = r.subject_position || '—';

    // Determine grade color
    let gradeClass = 'grade-low';
    if (grade === 'A' || grade === 'B') gradeClass = 'grade-high';
    else if (grade === 'C' || grade === 'D') gradeClass = 'grade-mid';

    const row = document.createElement('tr');
    row.innerHTML = `
      <td><strong>${r.subject || 'Unknown'}</strong></td>
      <td>${ca1}</td>
      <td>${ca2}</td>
      <td>${midterm}</td>
      <td>${exam}</td>
      <td><strong>${total}</strong></td>
      <td><span class="${gradeClass}">${grade}</span></td>
      <td>${remark}</td>
      <td>${position}</td>
    `;
    tbody.appendChild(row);
  });

  // Show results section
  document.getElementById('resultsDisplaySection').style.display = 'block';

  // Scroll to results
  document.getElementById('resultsDisplaySection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Download function - update to use current result data
function downloadCurrentResult() {
  const regNo = document.getElementById('dispRegNo').textContent;
  const klass = document.getElementById('dispClass').textContent;
  const session = document.getElementById('dispSession').textContent;
  const term = document.getElementById('dispTerm').textContent;

  // Create a simple text file or HTML for download
  const table = document.querySelector('#resultsTable');
  const html = `
    <!DOCTYPE html>
    <html>
    <head>
      <title>Result - ${regNo}</title>
      <style>
        body { font-family: Arial; margin: 20px; }
        .header { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
      </style>
    </head>
    <body>
      <div class="header">
        <h1>Student Result</h1>
        <p><strong>Reg. No:</strong> ${regNo}</p>
        <p><strong>Class:</strong> ${klass}</p>
        <p><strong>Session:</strong> ${session}</p>
        <p><strong>Term:</strong> ${term}</p>
      </div>
      ${table.outerHTML}
    </body>
    </html>
  `;

  const blob = new Blob([html], { type: 'text/html' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Result_${regNo}_${session}_${term}.html`;
  document.body.appendChild(a);
  a.click();
  window.URL.revokeObjectURL(url);
  document.body.removeChild(a);
}

    function getGradeRemark(score) {
      if (score >= 70) return { grade: 'A', remark: 'Excellent' };
      if (score >= 60) return { grade: 'B', remark: 'Very Good' };
      if (score >= 50) return { grade: 'C', remark: 'Good' };
      if (score >= 40) return { grade: 'D', remark: 'Pass' };
      return { grade: 'F', remark: 'Fail' };
    }

    function getGradeClass(score) {
      if (score >= 60) return 'grade-high';
      if (score >= 40) return 'grade-mid';
      return 'grade-low';
    }

    function displayResult(result) {
      document.getElementById("dispRegNo").textContent = result.regNo;
      document.getElementById("dispClass").textContent = result.class;
      document.getElementById("dispSession").textContent = result.session;
      document.getElementById("dispTerm").textContent = result.term;

      const tbody = document.querySelector('.results-table tbody');
      tbody.innerHTML = '';

      if (Array.isArray(result.results) && result.results.length > 0) {
        result.results.forEach(r => {
          const ca1 = r.ca1 || 0;
          const ca2 = r.ca2 || 0;
          const midterm = r.midterm || 0;
          const exam = r.exam || 0;
          const total = ca1 + ca2 + midterm + exam;
          const { grade, remark } = getGradeRemark(total);
          const position = r.subject_position || r.position || '-';

          const row = document.createElement('tr');
          row.innerHTML = `
            <td><strong>${r.subject || 'N/A'}</strong></td>
            <td>${ca1}</td>
            <td>${ca2}</td>
            <td>${midterm}</td>
            <td>${exam}</td>
            <td><strong>${total}</strong></td>
            <td class="${getGradeClass(total)}"><strong>${grade}</strong></td>
            <td>${remark}</td>
            <td><strong>${position}</strong></td>
          `;
          tbody.appendChild(row);
        });
      }

      document.getElementById("resultsDisplaySection").style.display = "block";

      saveViewedResult({
        regNo: result.regNo,
        class: result.class,
        session: result.session,
        term: result.term
      });

      renderPreviousResults();
    }

  </script>
